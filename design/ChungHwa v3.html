<style>
  html, body { margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;

  @keyframes chh-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  @keyframes chh-spin { to { transform: rotate(360deg); } }

  @keyframes ch-shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  .ch-spin { animation: ch-spin 0.9s linear infinite; display: inline-flex; }

  /* Anonymous mode */
  .ch-anon .ch-mask { filter: blur(4px) saturate(0.5); transition: filter 200ms ease; }
  .ch-anon .ch-mask:hover { filter: blur(0) saturate(1); }
