name: Release DMG

# Builds an unsigned (ad-hoc) ChungHwa.dmg and attaches it to a GitHub
# Release. Triggered by pushing a tag matching `v*`.
#
# Unsigned: no Apple Developer ID, no notarization, no identity in CI.
# Users get a Gatekeeper warning on first open; the release notes tell
# them to either right-click > Open or run
#   xattr -dr com.apple.quarantine /Applications/ChungHwa.app

on:
  push:
    tags:
      - 'v*'
  # Manual trigger: builds the DMG as an artifact without making a release.
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach DMGs to a release on tag push

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Select latest Xcode
        run: |
          # Pick the highest-versioned Xcode installed on the runner —
          # GitHub names them /Applications/Xcode_<version>.app.
          XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [[ -z "$XCODE" ]]; then
            echo "no Xcode_*.app found in /Applications" >&2
            ls /Applications | grep -i xcode || true
            exit 1
          fi
          echo "selecting $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build three slices — universal, arm64, x86_64
        env:
          # Authenticated api.github.com quota for fetch-mihomo.sh.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: "Manual"
          CODE_SIGNING_ALLOWED: "YES"
          CODE_SIGNING_REQUIRED: "NO"
          PROVISIONING_PROFILE_SPECIFIER: ""
        run: |
          chmod +x scripts/make-dmg.sh scripts/fetch-mihomo.sh
          VERSION="${GITHUB_REF_NAME#v}"
          # Universal first (script will fetch the universal mihomo from
          # GitHub releases). Arch-specific builds run after and lipo-thin
          # mihomo locally before xcodebuild.
          ./scripts/make-dmg.sh "$VERSION" universal
          ./scripts/make-dmg.sh "$VERSION" arm64
          ./scripts/make-dmg.sh "$VERSION" x86_64

      - name: Hash + list artifact
        run: |
          cd build
          shasum -a 256 *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt
          ls -lh

      - name: Build release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the `## [VERSION] — date` section out of CHANGELOG.md.
          # Awk runs until the next `## [` header.
          notes=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (started) exit
              if ($0 ~ "^## \\[" ver "\\]") { started = 1; next }
            }
            started { print }
          ' CHANGELOG.md | sed -e '/./,$!d' | awk 'BEGIN{n=0} {a[n++]=$0} END{
            # trim trailing blank lines
            while (n>0 && a[n-1] ~ /^[[:space:]]*$/) n--
            for (i=0; i<n; i++) print a[i]
          }')

          {
            echo "## ChungHwa ${GITHUB_REF_NAME}"
            echo
            if [[ -n "$notes" ]]; then
              echo "$notes"
              echo
            fi
            echo "### Install"
            echo
            echo '```sh'
            echo "brew tap chloepike/chunghwa"
            echo "brew install --cask chunghwa"
            echo '```'
            echo
            echo "Or grab a DMG below. First open: right-click → Open, or"
            echo
            echo '```sh'
            echo "xattr -dr com.apple.quarantine /Applications/ChungHwa.app"
            echo '```'
            echo
            echo "Verify with \`shasum -a 256 ChungHwa-*.dmg\` against SHA256SUMS.txt."
          } > build/RELEASE_NOTES.md
          echo "--- composed release notes ---"
          cat build/RELEASE_NOTES.md

      - name: Upload artifact (always, even on workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: chunghwa-dmg
          path: |
            build/*.dmg
            build/SHA256SUMS.txt
          retention-days: 30

      - name: Attach to release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.dmg
            build/SHA256SUMS.txt
          draft: false
          prerelease: false
          body_path: build/RELEASE_NOTES.md
