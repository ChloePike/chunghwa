name: Release DMG

# Builds an unsigned (ad-hoc) ChungHwa.dmg and attaches it to a GitHub
# Release. Triggered by pushing a tag matching `v*`.
#
# Unsigned: no Apple Developer ID, no notarization, no identity in CI.
# Users get a Gatekeeper warning on first open; the release notes tell
# them to either right-click > Open or run
#   xattr -dr com.apple.quarantine /Applications/ChungHwa.app

on:
  push:
    tags:
      - 'v*'
  # Manual trigger: builds the DMG as an artifact without making a release.
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach DMGs to a release on tag push

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build .app + .dmg (unsigned, ad-hoc)
        env:
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: "Manual"
          CODE_SIGNING_ALLOWED: "YES"
          CODE_SIGNING_REQUIRED: "NO"
          PROVISIONING_PROFILE_SPECIFIER: ""
        run: |
          chmod +x scripts/make-dmg.sh scripts/fetch-mihomo.sh
          ./scripts/make-dmg.sh "${GITHUB_REF_NAME#v}"

      - name: Hash + list artifact
        run: |
          cd build
          shasum -a 256 *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt
          ls -lh

      - name: Upload artifact (always, even on workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: chunghwa-dmg
          path: |
            build/*.dmg
            build/SHA256SUMS.txt
          retention-days: 30

      - name: Attach to release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.dmg
            build/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ChungHwa ${{ github.ref_name }}

            未签名构建，自用版。第一次打开如果被 Gatekeeper 拦，运行：

            ```
            xattr -dr com.apple.quarantine /Applications/ChungHwa.app
            ```

            或在 Finder 里右键 → 打开。

            校验：`shasum -a 256 ChungHwa-*.dmg` 比对 SHA256SUMS.txt。
