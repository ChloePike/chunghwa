name: Release DMG

# Builds three unsigned (ad-hoc) DMGs in parallel — universal / arm64 /
# x86_64 — and attaches them to a GitHub Release on `v*` tag push.
#
# Unsigned: no Apple Developer ID, no notarization, no identity in CI.
# Users get a Gatekeeper warning on first open; the release notes tell
# them to either right-click > Open or run
#   xattr -dr com.apple.quarantine /Applications/ChungHwa.app

on:
  push:
    tags:
      - 'v*'
  # Manual trigger: builds DMGs as artifacts without making a release.
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach DMGs to a release on tag push

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-15
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        arch: [universal, arm64, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Select latest Xcode
        run: |
          # Pick the highest-versioned Xcode installed on the runner —
          # GitHub names them /Applications/Xcode_<version>.app.
          XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [[ -z "$XCODE" ]]; then
            echo "no Xcode_*.app found in /Applications" >&2
            ls /Applications | grep -i xcode || true
            exit 1
          fi
          echo "selecting $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Cache vendored mihomo
        # Skip the ~10s download + lipo + codesign per slice. The script
        # picks `latest` when no arg is passed, so the cache key is bound
        # to fetch-mihomo.sh — change the script (or pin a version) when
        # you want a fresh download.
        uses: actions/cache@v4
        with:
          path: Vendor/mihomo
          key: mihomo-${{ runner.os }}-${{ hashFiles('scripts/fetch-mihomo.sh') }}

      - name: Build ${{ matrix.arch }} slice
        env:
          # Authenticated api.github.com quota for fetch-mihomo.sh.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVELOPMENT_TEAM: ""
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: "Manual"
          CODE_SIGNING_ALLOWED: "YES"
          CODE_SIGNING_REQUIRED: "NO"
          PROVISIONING_PROFILE_SPECIFIER: ""
        run: |
          chmod +x scripts/make-dmg.sh scripts/fetch-mihomo.sh
          # Tag push: VERSION = tag minus leading v. Manual dispatch:
          # let make-dmg.sh fall back to Info.plist's CFBundleShortVersionString.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=""
          fi
          ./scripts/make-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunghwa-${{ matrix.arch }}
          path: build/ChungHwa-*-${{ matrix.arch }}.dmg
          retention-days: 30
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (for CHANGELOG.md)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: build
          pattern: chunghwa-*
          merge-multiple: true

      - name: Hash + list
        run: |
          cd build
          ls -lh
          shasum -a 256 *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Build release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the `## [VERSION] — date` section out of CHANGELOG.md.
          # Awk runs until the next `## [` header.
          notes=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (started) exit
              if ($0 ~ "^## \\[" ver "\\]") { started = 1; next }
            }
            started { print }
          ' CHANGELOG.md | sed -e '/./,$!d' | awk 'BEGIN{n=0} {a[n++]=$0} END{
            # trim trailing blank lines
            while (n>0 && a[n-1] ~ /^[[:space:]]*$/) n--
            for (i=0; i<n; i++) print a[i]
          }')

          {
            echo "## ChungHwa ${GITHUB_REF_NAME}"
            echo
            if [[ -n "$notes" ]]; then
              echo "$notes"
              echo
            fi
            echo "### Install"
            echo
            echo '```sh'
            echo "brew tap chloepike/chunghwa"
            echo "brew install --cask chunghwa"
            echo '```'
            echo
            echo "Or grab a DMG below. First open: right-click → Open, or"
            echo
            echo '```sh'
            echo "xattr -dr com.apple.quarantine /Applications/ChungHwa.app"
            echo '```'
            echo
            echo "Verify with \`shasum -a 256 ChungHwa-*.dmg\` against SHA256SUMS.txt."
          } > build/RELEASE_NOTES.md
          echo "--- composed release notes ---"
          cat build/RELEASE_NOTES.md

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.dmg
            build/SHA256SUMS.txt
          draft: false
          prerelease: false
          body_path: build/RELEASE_NOTES.md
